name: db-benchmark

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sqlite-mattn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - uses: ./.github/actions/go-cache
        with:
          cache-name: sqlite-mattn
      - run: make deps-backend
      - run: TAGS="bindata sqlite sqlite_unlock_notify" time make backend
      - run: ls -l gitea
      - name: run tests
        run: TAGS="bindata sqlite sqlite_unlock_notify" make test-integration
        timeout-minutes: 50
        env:
          GITEA_TEST_DATABASE: sqlite
          GOTEST_FLAGS: -timeout=40m

  sqlite-modernc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - uses: ./.github/actions/go-cache
        with:
          cache-name: sqlite-modenrc
      - run: make deps-backend
      - run: TAGS="bindata sqlite_modernc" time make backend
      - run: ls -l gitea
      - name: run tests
        run: TAGS="bindata sqlite_modernc" make test-integration
        timeout-minutes: 50
        env:
          GITEA_TEST_DATABASE: sqlite
          GOTEST_FLAGS: -timeout=40m

  sqlite-ncruces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - uses: ./.github/actions/go-cache
        with:
          cache-name: sqlite-ncruces
      - run: make deps-backend
      - run: TAGS="bindata sqlite_ncruces" time make backend
      - run: ls -l gitea
      - name: run tests
        run: TAGS="bindata sqlite_ncruces" make test-integration
        timeout-minutes: 50
        env:
          GITEA_TEST_DATABASE: sqlite
          GOTEST_FLAGS: -timeout=40m
