name: moonbit-gitea-docker

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release image tag, for example 1.26.1-moonbit.1
        required: false
        type: string
  push:
    tags:
      - "v*-moonbit.*"
      - "[0-9]*-moonbit.*"

permissions:
  contents: read

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare tags
        id: vars
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          upstream_version=$(git describe --tags --always --match 'v[0-9]*' \
            | sed -e 's/^v//')
          short_sha=$(git rev-parse --short=12 HEAD)
          immutable_tag="moonbit-${upstream_version}-${short_sha}"

          release_tag="${INPUT_RELEASE_TAG}"
          if [ -z "${release_tag}" ] && [ "${REF_TYPE}" = "tag" ]; then
            release_tag="${REF_NAME#v}"
          fi

          {
            echo "upstream_version=${upstream_version}"
            echo "short_sha=${short_sha}"
            echo "immutable_tag=${immutable_tag}"
            echo "release_tag=${release_tag}"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/moonbitlang/gitea
          tags: |
            type=raw,value=${{ steps.vars.outputs.immutable_tag }}
            type=raw,value=${{ steps.vars.outputs.release_tag }},enable=${{ steps.vars.outputs.release_tag != '' }}
          labels: |
            org.opencontainers.image.title=Moonbitlang Gitea
            org.opencontainers.image.source=https://github.com/moonbitlang/gitea

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push rootful image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release summary
        run: |
          {
            echo "### Moonbitlang Gitea image"
            echo
            echo "Tags:"
            echo '${{ steps.meta.outputs.tags }}'
            echo
            echo "Digest:"
            echo "docker.io/moonbitlang/gitea@${{ steps.build.outputs.digest }}"
          } >> "${GITHUB_STEP_SUMMARY}"
