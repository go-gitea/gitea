name: go-setup
description: Set up Go and restore the go module, build, and golangci-lint caches.

inputs:
  cache:
    description: Restore the go caches via go-cache. Disable for jobs that don't build Go.
    default: "true"
  lint-cache:
    description: Forwarded to go-cache to also restore the golangci-lint cache.
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        check-latest: true
        cache: false
    - if: ${{ inputs.cache == 'true' }}
      uses: ./.github/actions/go-cache
      with:
        lint-cache: ${{ inputs.lint-cache }}
