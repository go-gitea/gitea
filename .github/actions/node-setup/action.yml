name: node-setup
description: Set up pnpm and node and restore caches

inputs:
  cache:
    description: Cache pnpm downloads keyed on pnpm-lock.yaml.
    default: "true"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: ${{ inputs.cache == 'true' && 'pnpm' || '' }}
        cache-dependency-path: ${{ inputs.cache == 'true' && 'pnpm-lock.yaml' || '' }}
