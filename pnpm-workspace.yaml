packages: [ . ] # workaround for https://github.com/SukkaW/nolyfill/issues/119
savePrefix: ''
dedupePeerDependents: false
updateNotifier: false
minimumReleaseAge: 0

peerDependencyRules:
  allowedVersions:
    eslint-plugin-github>eslint: '>=9'

overrides:
  number-is-nan: npm:@nolyfill/number-is-nan@^1

allowBuilds:
  '@scarf/scarf': false
  core-js: false
  esbuild: true
  unrs-resolver: true
